<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680">
<title>Asul din mânecă — Aequus</title>

<rect width="680" height="680" fill="#1a0a0a"/>

<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.05"/>
  </pattern>
</defs>
<rect width="680" height="680" fill="url(#grid)"/>

<rect x="0" y="0" width="5" height="680" fill="#c41e3a"/>

<text x="40" y="40" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#c41e3a" letter-spacing="0.18em">IRAN · ANALIZĂ · ZIUA 105</text>

<line x1="40" y1="56" x2="640" y2="56" stroke="#3a2a2a" stroke-width="0.8"/>

<text x="40" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#f2efe6">Asul din</text>
<text x="40" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" font-style="italic" fill="#c41e3a">mânecă</text>

<line x1="40" y1="222" x2="640" y2="222" stroke="#3a2a2a" stroke-width="0.8"/>

<text x="40" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e8e4d8">Acordul Iran-SUA:</text>
<text x="40" y="304" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e8e4d8">semnare astăzi,</text>
<text x="40" y="338" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e8e4d8">conținut în 30-60 de zile</text>

<rect x="40" y="380" width="600" height="1" fill="#3a2a2a"/>

<text x="40" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c41e3a" letter-spacing="0.14em">AZI</text>
<text x="40" y="458" font-family="Georgia, serif" font-size="17" fill="#c8c4b8">Trump: semnare a acordului cu Iranul</text>

<text x="40" y="496" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c41e3a" letter-spacing="0.14em">60 ZILE</text>
<text x="40" y="524" font-family="Georgia, serif" font-size="17" fill="#c8c4b8">Negocieri privind programul nuclear</text>

<text x="40" y="562" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c41e3a" letter-spacing="0.14em">30 ZILE</text>
<text x="40" y="590" font-family="Georgia, serif" font-size="17" fill="#c8c4b8">Finalizarea acordului de pace</text>

<rect x="40" y="612" width="2" height="28" fill="#4a6fa5"/>
<text x="56" y="630" font-family="Georgia, serif" font-size="14" fill="#8888a0" font-style="italic">Beneficiul politic se încasează azi.</text>

<line x1="0" y1="660" x2="680" y2="660" stroke="#3a2a2a" stroke-width="0.5"/>
<text x="40" y="678" font-family="Arial, sans-serif" font-size="12" fill="#707070" letter-spacing="0.08em">15 IUNIE 2026</text>
<text x="640" y="678" font-family="Georgia, serif" font-size="15" fill="#c41e3a" text-anchor="end" font-style="italic">aequus</text>

</svg>
