<svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="680" fill="#1a0a0a"/>

  <text x="40" y="80" font-family="Georgia, serif" font-size="15" letter-spacing="2" fill="#c41e3a" font-weight="bold">SUA — NATO — ANALIZĂ</text>

  <line x1="40" y1="104" x2="640" y2="104" stroke="#3a2020" stroke-width="0.5"/>

  <text x="40" y="200" font-family="Georgia, serif" font-size="52" fill="#e8e4d8" font-weight="bold">Un lunatec la</text>
  <text x="40" y="256" font-family="Georgia, serif" font-size="52" fill="#e8e4d8" font-weight="bold">Washington D.C.</text>

  <line x1="40" y1="294" x2="640" y2="294" stroke="#3a2020" stroke-width="0.5"/>

  <text x="40" y="332" font-family="Georgia, serif" font-size="16" fill="#d4cfc0">A confundat Iranul cu Japonia. L-a numit</text>
  <text x="40" y="358" font-family="Georgia, serif" font-size="16" fill="#d4cfc0">pe Zelenski "Putin". A legat trupele din</text>
  <text x="40" y="384" font-family="Georgia, serif" font-size="16" fill="#d4cfc0">Europa de o revendicare asupra Groenlandei.</text>

  <text x="40" y="434" font-family="Georgia, serif" font-size="15" fill="#a09880" font-style="italic">Amenințat cu ruperea relațiilor: Spania.</text>
  <text x="40" y="460" font-family="Georgia, serif" font-size="15" fill="#a09880" font-style="italic">Umilită public, în aceeași săptămână: Meloni.</text>

  <line x1="40" y1="500" x2="640" y2="500" stroke="#3a2020" stroke-width="0.5"/>

  <text x="40" y="540" font-family="Georgia, serif" font-size="18" fill="#e8e4d8" font-style="italic">Cum ajung asemenea personaje</text>
  <text x="40" y="568" font-family="Georgia, serif" font-size="18" fill="#e8e4d8" font-style="italic">să conducă națiuni?</text>

  <line x1="40" y1="608" x2="640" y2="608" stroke="#3a2020" stroke-width="0.5"/>
  <text x="40" y="640" font-family="Georgia, serif" font-size="14" fill="#c41e3a" letter-spacing="1">AEQUUS.NEWS</text>
  <text x="640" y="640" text-anchor="end" font-family="Georgia, serif" font-size="14" fill="#a09880">10 iulie 2026</text>
</svg>
