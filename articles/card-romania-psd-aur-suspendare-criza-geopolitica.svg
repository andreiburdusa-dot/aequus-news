<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680">
<title>România, utilă idioată — Aequus</title>

<!-- Fundal -->
<rect width="680" height="680" fill="#0a0a0f"/>

<!-- Textură subtilă — linii diagonale fine -->
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.06"/>
  </pattern>
</defs>
<rect width="680" height="680" fill="url(#grid)"/>

<!-- Accent roșu stânga — linie verticală -->
<rect x="0" y="0" width="5" height="680" fill="#c41e3a"/>

<!-- Zona superioară — AEQUUS brand -->
<rect x="40" y="40" width="680" height="60" fill="none"/>
<text x="40" y="72"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="13" font-weight="800"
  fill="#ffffff" letter-spacing="0.22em" opacity="0.5">AEQUUS.NEWS</text>

<text x="600" y="72"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10" font-weight="700"
  fill="#c41e3a" letter-spacing="0.14em">ROMÂNIA</text>

<!-- Linie separator top -->
<line x1="40" y1="88" x2="640" y2="88" stroke="#1e1e2e" stroke-width="0.8"/>

<!-- Label ANALIZĂ -->
<rect x="40" y="108" width="80" height="22" rx="2" fill="rgba(196,30,58,0.15)"/>
<rect x="40" y="108" width="3" height="22" fill="#c41e3a"/>
<text x="52" y="123"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="9" font-weight="700"
  fill="#c41e3a" letter-spacing="0.16em">ANALIZĂ</text>

<!-- Titlu principal — mare, impactant -->
<text x="40" y="178"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="48" font-weight="700"
  fill="#e8e8f0" letter-spacing="-0.01em">România,</text>

<text x="40" y="234"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="48" font-weight="700"
  font-style="italic"
  fill="#c41e3a" letter-spacing="-0.01em">utilă idioată.</text>

<!-- Subtitlu -->
<text x="40" y="284"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="15" font-weight="400"
  fill="#8888a0" letter-spacing="0.01em">Cum pregătesc PSD și AUR</text>

<text x="40" y="306"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="15" font-weight="400"
  fill="#8888a0" letter-spacing="0.01em">prima suspendare de președinte</text>

<text x="40" y="328"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="15" font-weight="400"
  fill="#8888a0" letter-spacing="0.01em">din istoria NATO în timp de război</text>

<!-- Linie separator mijloc -->
<line x1="40" y1="360" x2="640" y2="360" stroke="#1e1e2e" stroke-width="0.8"/>

<!-- Pull quote central -->
<rect x="40" y="378" width="4" height="90" fill="#c41e3a"/>
<text x="58" y="404"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="17" font-style="italic"
  fill="#e8e8f0" letter-spacing="0.01em">„Nu dărâmă doar un guvern.</text>
<text x="58" y="428"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="17" font-style="italic"
  fill="#e8e8f0">Dărâmă singura axă de stabilitate</text>
<text x="58" y="452"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="17" font-style="italic"
  fill="#e8e8f0">pe care România o mai are."</text>

<!-- Linie separator jos -->
<line x1="40" y1="488" x2="640" y2="488" stroke="#1e1e2e" stroke-width="0.8"/>

<!-- Taguri tematice -->
<rect x="40" y="508" width="98" height="26" rx="13" fill="none" stroke="#1e1e2e" stroke-width="1"/>
<text x="89" y="525" text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10" font-weight="600"
  fill="#55556a" letter-spacing="0.1em">#PSD-AUR</text>

<rect x="150" y="508" width="110" height="26" rx="13" fill="none" stroke="#1e1e2e" stroke-width="1"/>
<text x="205" y="525" text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10" font-weight="600"
  fill="#55556a" letter-spacing="0.1em">#Suspendare</text>

<rect x="272" y="508" width="76" height="26" rx="13" fill="none" stroke="#1e1e2e" stroke-width="1"/>
<text x="310" y="525" text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10" font-weight="600"
  fill="#55556a" letter-spacing="0.1em">#NATO</text>

<rect x="360" y="508" width="96" height="26" rx="13" fill="none" stroke="#1e1e2e" stroke-width="1"/>
<text x="408" y="525" text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10" font-weight="600"
  fill="#55556a" letter-spacing="0.1em">#Bolojan</text>

<!-- Autor + data -->
<text x="40" y="590"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="12" font-weight="700"
  fill="#e8e8f0" letter-spacing="0.04em">Andrei Constantin Burdușa</text>

<text x="40" y="610"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="11" font-weight="400"
  fill="#55556a" letter-spacing="0.04em">28 aprilie 2025 · aequus.news</text>

<!-- Element decorativ dreapta jos — triunghi accent -->
<polygon points="640,560 640,640 560,640" fill="rgba(196,30,58,0.08)"/>
<polygon points="640,600 640,640 600,640" fill="rgba(196,30,58,0.15)"/>

<!-- Linie border bottom -->
<rect x="0" y="674" width="680" height="6" fill="#c41e3a" opacity="0.6"/>

</svg>
