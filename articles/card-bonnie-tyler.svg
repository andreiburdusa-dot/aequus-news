<svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="680" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14141f" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="680" height="680" fill="url(#grid)"/>
  <rect x="0" y="0" width="680" height="3" fill="#4a6fa5"/>

  <text x="48" y="58" font-family="Georgia, serif" font-size="13" fill="#4a6fa5" letter-spacing="3">AEQUUS.NEWS</text>
  <line x1="0" y1="72" x2="680" y2="72" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="48" y="106" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#555568" letter-spacing="2">CULTURĂ · IN MEMORIAM</text>
  <line x1="0" y1="122" x2="680" y2="122" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="48" y="180" font-family="Georgia, serif" font-size="32" fill="#e8e8f0" font-weight="normal">Bonnie Tyler</text>
  <text x="48" y="222" font-family="Georgia, serif" font-size="19" fill="#8888a0" font-style="italic">vocea răgușită a unei epoci</text>
  <text x="48" y="252" font-family="Georgia, serif" font-size="19" fill="#8888a0" font-style="italic">s-a stins la 75 de ani</text>

  <line x1="0" y1="290" x2="680" y2="290" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="48" y="330" font-family="Georgia, serif" font-size="15" fill="#9090a8">A murit joi seară la spitalul din Faro,</text>
  <text x="48" y="356" font-family="Georgia, serif" font-size="15" fill="#9090a8">Portugalia, "neașteptat", potrivit familiei.</text>

  <rect x="48" y="400" width="2" height="70" fill="#4a6fa5"/>
  <text x="64" y="428" font-family="Georgia, serif" font-size="14" fill="#a0a0bc" font-style="italic">"Total Eclipse of the Heart"</text>
  <text x="64" y="452" font-family="Georgia, serif" font-size="14" fill="#a0a0bc" font-style="italic">"Holding Out for a Hero"</text>

  <line x1="0" y1="510" x2="680" y2="510" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="48" y="548" font-family="Georgia, serif" font-size="15" fill="#9090a8">Internată din mai, în comă indusă</text>
  <text x="48" y="574" font-family="Georgia, serif" font-size="15" fill="#9090a8">după complicații chirurgicale de urgență.</text>

  <line x1="0" y1="630" x2="680" y2="630" stroke="#1e1e2e" stroke-width="0.5"/>
  <text x="48" y="662" font-family="Georgia, serif" font-size="14" fill="#4a6fa5" letter-spacing="1">AEQUUS.NEWS</text>
  <text x="640" y="662" text-anchor="end" font-family="Georgia, serif" font-size="14" fill="#a09880">9 iulie 2026</text>
</svg>
