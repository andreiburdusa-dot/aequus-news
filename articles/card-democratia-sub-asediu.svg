<svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="680" fill="#0a0a0f"/>
  
  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14141f" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="680" height="680" fill="url(#grid)"/>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="680" height="3" fill="#4a6fa5"/>
  
  <!-- Zone 1: Site name -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="13" fill="#4a6fa5" letter-spacing="3">AEQUUS.NEWS</text>
  
  <!-- Divider 1 -->
  <line x1="0" y1="72" x2="680" y2="72" stroke="#1e1e2e" stroke-width="0.5"/>
  
  <!-- Zone 2: Category -->
  <text x="48" y="106" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#555568" letter-spacing="2">ANALIZĂ · DEMOCRAȚIE · ARHITECTURĂ INSTITUȚIONALĂ</text>
  
  <!-- Divider 2 -->
  <line x1="0" y1="122" x2="680" y2="122" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 3: Title -->
  <text x="48" y="178" font-family="Georgia, serif" font-size="32" fill="#e8e8f0" font-weight="normal">Democrația sub asediu</text>
  <text x="48" y="222" font-family="Georgia, serif" font-size="20" fill="#8888a0" font-style="italic">diagnostic și arhitectură pentru</text>
  <text x="48" y="254" font-family="Georgia, serif" font-size="20" fill="#8888a0" font-style="italic">un sistem care trebuie reinventat</text>

  <!-- Divider 3 -->
  <line x1="0" y1="284" x2="680" y2="284" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 4: Lead text -->
  <text x="48" y="322" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">Democrația nu moare prin lovituri de stat.</text>
  <text x="48" y="346" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">Moare prin sufocare epistemică — prin excesul</text>
  <text x="48" y="370" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">de informație nefiltrată care distruge capacitatea</text>
  <text x="48" y="394" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">de deliberare înainte ca votul să aibă loc.</text>

  <!-- Accent quote line -->
  <rect x="48" y="420" width="2" height="80" fill="#4a6fa5"/>
  <text x="64" y="448" font-family="Georgia, serif" font-size="13" fill="#6868888" font-style="italic">Nu lipsa informației atacă democrația azi —</text>
  <text x="64" y="470" font-family="Georgia, serif" font-size="13" fill="#686888" font-style="italic">ci excesul ei nefiltrat.</text>

  <!-- Divider 4 -->
  <line x1="0" y1="522" x2="680" y2="522" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 5: Pillars -->
  <text x="48" y="558" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4a6fa5" letter-spacing="1.5">TREI PILONI · NIVEL FEDERAL EUROPEAN</text>
  
  <rect x="48" y="578" width="160" height="60" fill="#0e0e1a" rx="2"/>
  <text x="128" y="601" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">Apărare</text>
  <text x="128" y="618" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">epistemică</text>
  <text x="128" y="635" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" text-anchor="middle">colectivă</text>

  <rect x="222" y="578" width="160" height="60" fill="#0e0e1a" rx="2"/>
  <text x="302" y="601" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">Transparență</text>
  <text x="302" y="618" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">electorală</text>
  <text x="302" y="635" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" text-anchor="middle">federală</text>

  <rect x="396" y="578" width="236" height="60" fill="#0e0e1a" rx="2"/>
  <text x="514" y="601" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">Deliberare</text>
  <text x="514" y="618" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">cetățenească</text>
  <text x="514" y="635" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" text-anchor="middle">structurată</text>

  <!-- Bottom accent -->
  <rect x="0" y="677" width="680" height="3" fill="#4a6fa5" opacity="0.4"/>
</svg>
