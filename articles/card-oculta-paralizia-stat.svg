<svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="680" fill="#0a0a0f"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14141f" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="680" height="680" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="680" height="3" fill="#4a6fa5"/>

  <!-- Zone 1: Site name -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="13" fill="#4a6fa5" letter-spacing="3">AEQUUS.NEWS</text>

  <!-- Divider 1 -->
  <line x1="0" y1="72" x2="680" y2="72" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 2: Category -->
  <text x="48" y="106" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#555568" letter-spacing="2">ANALIZĂ · SOCIETATE · GUVERNANȚĂ</text>

  <!-- Divider 2 -->
  <line x1="0" y1="122" x2="680" y2="122" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 3: Title -->
  <text x="48" y="172" font-family="Georgia, serif" font-size="32" fill="#e8e8f0" font-weight="normal">Oculta, paralizia și</text>
  <text x="48" y="212" font-family="Georgia, serif" font-size="32" fill="#e8e8f0" font-weight="normal">statul care refuză</text>
  <text x="48" y="252" font-family="Georgia, serif" font-size="32" fill="#e8e8f0" font-weight="normal">să decidă</text>

  <!-- Divider 3 -->
  <line x1="0" y1="282" x2="680" y2="282" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 4: Lead facts -->
  <text x="48" y="318" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">Conspiraționismul nu doar mobilizează ura —</text>
  <text x="48" y="340" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">paralizează și acțiunea civică.</text>
  <text x="48" y="368" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">România citează Estonia de două decenii,</text>
  <text x="48" y="390" font-family="Georgia, serif" font-size="14.5" fill="#9090a8">fără să-i preia arhitectura instituțională.</text>

  <!-- Accent quote/stat line -->
  <rect x="48" y="418" width="2" height="76" fill="#4a6fa5"/>
  <text x="64" y="448" font-family="Georgia, serif" font-size="26" fill="#e8e8f0">3,1 / 10</text>
  <text x="64" y="472" font-family="Georgia, serif" font-size="13" fill="#a0a0bc" font-style="italic">scorul digital al României — Estonia: 9/10</text>

  <!-- Divider 4 -->
  <line x1="0" y1="518" x2="680" y2="518" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- Zone 5: Pillars -->
  <text x="48" y="554" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4a6fa5" letter-spacing="1.5">DOUĂ SIMPTOME · O SINGURĂ RĂDĂCINĂ</text>

  <rect x="48" y="574" width="286" height="60" fill="#0e0e1a" rx="2"/>
  <text x="191" y="597" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">Oculta fără nume</text>
  <text x="191" y="614" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">paralizează acțiunea</text>
  <text x="191" y="631" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" text-anchor="middle">civică</text>

  <rect x="346" y="574" width="286" height="60" fill="#0e0e1a" rx="2"/>
  <text x="489" y="597" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">Statul fragmentat</text>
  <text x="489" y="614" font-family="Georgia, serif" font-size="10.5" fill="#7878a0" text-anchor="middle">nu poate fi tras</text>
  <text x="489" y="631" font-family="Georgia, serif" font-size="10" fill="#4a6fa5" text-anchor="middle">la răspundere</text>

  <!-- Bottom accent -->
  <rect x="0" y="677" width="680" height="3" fill="#4a6fa5" opacity="0.4"/>
</svg>
